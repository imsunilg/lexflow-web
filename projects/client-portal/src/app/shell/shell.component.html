<div class="portal-shell">
  <mat-toolbar class="portal-shell__topbar">
    <span class="portal-shell__brand">LexFlow</span>
    <span class="portal-shell__spacer"></span>
    <button mat-icon-button aria-label="Language">
      <mat-icon>translate</mat-icon>
    </button>
    <button mat-icon-button aria-label="Notifications">
      <mat-icon>notifications</mat-icon>
    </button>
    <button mat-icon-button [matMenuTriggerFor]="profileMenu" aria-label="Account">
      <mat-icon>account_circle</mat-icon>
    </button>
    <mat-menu #profileMenu="matMenu">
      <a mat-menu-item routerLink="profile" i18n="@@shell.account.profile">Profile</a>
      <button mat-menu-item i18n="@@shell.account.signOut">Sign out</button>
    </mat-menu>
  </mat-toolbar>

  <main class="portal-shell__content">
    <router-outlet />
  </main>

  <nav class="portal-shell__bottom-nav" aria-label="Portal navigation">
    @for (item of navItems; track item.path) {
      <a
        class="portal-shell__nav-item"
        [routerLink]="[item.path]"
        routerLinkActive="portal-shell__nav-item--active"
      >
        <mat-icon>{{ item.icon }}</mat-icon>
        <span>{{ item.label }}</span>
      </a>
    }
  </nav>
</div>
