<div class="login-page">
  <div class="login-page__card">
    <h1 i18n="@@auth.forgotPassword.title">Forgot password</h1>

    @if (!submitted()) {
      <p class="login-page__subtitle" i18n="@@auth.forgotPassword.subtitle">
        Enter your firm code and email — we'll send a reset link if an account matches.
      </p>
      <form [formGroup]="form" (ngSubmit)="submit()">
        <mat-form-field appearance="outline">
          <mat-label i18n="@@auth.forgotPassword.tenantLabel">Firm code</mat-label>
          <input matInput formControlName="tenantSlug" />
        </mat-form-field>
        <mat-form-field appearance="outline">
          <mat-label i18n="@@auth.forgotPassword.emailLabel">Email</mat-label>
          <input matInput type="email" formControlName="email" />
        </mat-form-field>
        <button mat-flat-button color="primary" type="submit">
          <span i18n="@@auth.forgotPassword.submitButton">Send reset link</span>
        </button>
      </form>
    } @else {
      <p class="login-page__subtitle" i18n="@@auth.forgotPassword.confirmation">
        If an account matches, a reset link has been sent to that email.
      </p>
    }

    <a class="login-page__forgot" routerLink="/login" i18n="@@auth.forgotPassword.backLink">
      Back to sign in
    </a>
  </div>
</div>
