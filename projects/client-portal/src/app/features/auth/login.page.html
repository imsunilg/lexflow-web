<div class="login-page">
  <div class="login-page__card">
    <h1 i18n="@@auth.login.title">Sign in</h1>
    <p class="login-page__subtitle" i18n="@@auth.login.subtitle">
      Access your matters, invoices, and documents.
    </p>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <mat-form-field appearance="outline">
        <mat-label i18n="@@auth.login.tenantLabel">Firm code</mat-label>
        <input matInput formControlName="tenantSlug" autocomplete="organization" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label i18n="@@auth.login.emailLabel">Email</mat-label>
        <input matInput type="email" formControlName="email" autocomplete="email" />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label i18n="@@auth.login.passwordLabel">Password</mat-label>
        <input
          matInput
          type="password"
          formControlName="password"
          autocomplete="current-password"
        />
      </mat-form-field>

      @if (error()) {
        <p class="login-page__error">{{ error() }}</p>
      }

      @if (submitting()) {
        <mat-progress-bar mode="indeterminate" />
      }

      <button mat-flat-button color="primary" type="submit" [disabled]="submitting()">
        <span i18n="@@auth.login.submitButton">Sign in</span>
      </button>
    </form>

    <a class="login-page__forgot" routerLink="/forgot-password" i18n="@@auth.login.forgotLink">
      Forgot password?
    </a>
  </div>
</div>
