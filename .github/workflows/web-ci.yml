name: Web CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    name: Lint (ESLint, Stylelint, Prettier)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npm run lint
      - run: npm run lint:styles
      - run: npm run format:check

  unit-test:
    name: Unit tests (staff-portal, client-portal, shared)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx ng test staff-portal --watch=false --browsers=ChromeHeadless
      - run: npx ng test client-portal --watch=false --browsers=ChromeHeadless
      - run: npx ng test shared --watch=false --browsers=ChromeHeadless

  build:
    name: Build both apps + bundle-size budget (PRD §31)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx ng build staff-portal
      - run: npx ng build client-portal
      - run: node scripts/check-bundle-budget.mjs staff-portal
      - run: node scripts/check-bundle-budget.mjs client-portal
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 3

  e2e:
    name: Playwright smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npm run e2e
        env:
          CI: true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7

  e2e-fullstack:
    # PRD §37: "E2E (Playwright: 40 critical journeys ...)" run against the
    # full local stack, not the mocked-API suite above. Needs three sibling
    # repos (this one, lexflow-api, lexflow-database) checked out side by
    # side, exactly like local dev — see e2e/playwright.fullstack.config.ts
    # and e2e/fixtures/real-auth.ts for the matching client-side half of
    # this setup.
    name: Full-stack E2E (40 critical journeys, PRD §37)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout lexflow-web
        uses: actions/checkout@v4
        with:
          path: lexflow-web

      - name: Checkout lexflow-api
        uses: actions/checkout@v4
        with:
          repository: imsunilg/lexflow-api
          path: lexflow-api

      - name: Checkout lexflow-database
        uses: actions/checkout@v4
        with:
          repository: imsunilg/lexflow-database
          path: lexflow-database

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: lexflow-web/package-lock.json

      - name: Start docker-compose stack (Postgres, Redis, Elasticsearch, Azurite, API, workers)
        working-directory: lexflow-api
        run: docker compose up -d --build

      - name: Wait for API health
        run: |
          for i in $(seq 1 60); do
            if curl -sf http://localhost:8080/health >/dev/null 2>&1; then
              echo "API is up."
              exit 0
            fi
            sleep 5
          done
          echo "API did not become healthy in time." >&2
          docker compose -f lexflow-api/docker-compose.yml logs
          exit 1

      - name: Apply database schema (lexflow-database Runner)
        working-directory: lexflow-database
        env:
          LEXFLOW_DB_CONNECTION: "Host=localhost;Port=5432;Database=lexflow;Username=postgres;Password=postgres"
        run: dotnet run --project Runner/LexFlow.Database.Runner -- --scripts-path Scripts

      - name: Seed the E2E tenant/user/portal-client (lexflow-api tools/E2eSeed)
        working-directory: lexflow-api
        env:
          LEXFLOW_E2E_DB: "Host=localhost;Port=5432;Database=lexflow;Username=postgres;Password=postgres"
        run: dotnet run --project tools/E2eSeed

      - name: Install web dependencies
        working-directory: lexflow-web
        run: npm ci

      - run: npx playwright install --with-deps chromium
        working-directory: lexflow-web

      - name: Run the 40 critical journeys
        working-directory: lexflow-web
        env:
          CI: true
          # Optional — the two Razorpay-dependent steps in journey-02 skip
          # gracefully (not a failure) when these aren't set, per the
          # project decision that fabricating gateway credentials isn't
          # possible (Razorpay's payment-link API is a live call even in
          # test mode). Configure as repo/environment secrets to exercise
          # the real payment leg.
          RAZORPAY_TEST_KEY_ID: ${{ secrets.RAZORPAY_TEST_KEY_ID }}
          RAZORPAY_TEST_KEY_SECRET: ${{ secrets.RAZORPAY_TEST_KEY_SECRET }}
        run: npm run e2e:fullstack

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-fullstack-report
          path: lexflow-web/e2e/playwright-report/
          retention-days: 7

      - name: Tear down docker-compose stack
        if: always()
        working-directory: lexflow-api
        run: docker compose down -v

  deploy-gate:
    # The single required check to point a branch-protection rule at
    # (Settings -> Branches -> add "deploy-gate" to "Require status checks
    # to pass") — a workflow file can gate jobs *within itself* via `needs:`
    # but cannot configure GitHub's branch-protection required-checks list;
    # that's a repo setting only an admin can set, done once, pointing at
    # this job's name.
    name: Ready to deploy
    needs: [lint, unit-test, build, e2e, e2e-fullstack]
    runs-on: ubuntu-latest
    steps:
      - run: echo "All required checks passed — safe to deploy."

  # PRD §38: "merge to main -> staging auto-deploy." This deploys web-only
  # changes to the shared staging environment independently of
  # lexflow-api/lexflow-database's own pipelines — a change here shouldn't
  # need to wait on an unrelated API/DB pipeline to reach staging. This is
  # NOT the release gate: promoting to blue-green PRODUCTION is decided by
  # lexflow-api's .github/workflows/release.yml, which redeploys web to this
  # same staging environment itself (see that file) and only proceeds past
  # its D-18/C-15 gate once that redeploy, the API's, and the DB's are all
  # current for the exact commit being released — so a green run here is a
  # necessary but not sufficient signal for "safe to release."
  deploy-staging:
    name: Deploy both apps to Azure Static Web Apps (staging)
    needs: deploy-gate
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci

      # Bakes the real staging API URL into the built JS (see
      # projects/*/src/environments/environment.staging.ts for why this is a
      # placeholder-substitution rather than a runtime-read env var — static
      # hosting has no server to read process.env from).
      - name: Build staff-portal (staging)
        run: npm run build:staff-portal:staging
      - name: Substitute staging API URL (staff-portal)
        run: |
          grep -rl '__LEXFLOW_STAGING_API_URL__' dist/staff-portal/browser/*.js | \
            xargs -r sed -i "s|__LEXFLOW_STAGING_API_URL__|${{ secrets.LEXFLOW_STAGING_API_URL }}|g"

      - name: Build client-portal (staging)
        run: npm run build:client-portal:staging
      - name: Substitute staging API URL (client-portal)
        run: |
          grep -rl '__LEXFLOW_STAGING_API_URL__' dist/client-portal/browser/*.js | \
            xargs -r sed -i "s|__LEXFLOW_STAGING_API_URL__|${{ secrets.LEXFLOW_STAGING_API_URL }}|g"

      - name: Deploy staff-portal
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_STAFF }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/staff-portal/browser
          output_location: ""
          skip_app_build: true
          deployment_environment: staging

      - name: Deploy client-portal
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN_CLIENT }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: dist/client-portal/browser
          output_location: ""
          skip_app_build: true
          deployment_environment: staging
